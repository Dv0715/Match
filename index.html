<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金門消消樂</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700;900&family=Ma+Shan+Zheng&display=swap');

:root {
  --gold: #FFD700;
  --gold2: #C8972A;
  --red: #B22222;
  --cream: #FFF8E7;
  --dark: #1A0800;
  --board-bg: #3D1C00;

}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: 
    url('assets/ArtRes/Texture/BG.webp') center center / cover no-repeat fixed,
    radial-gradient(ellipse at top, #2A0A00 0%, #0D0400 70%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'Noto Serif TC', serif;
  overflow-x: hidden;
  color: var(--cream);
}

.header {
  text-align: center;
  padding: 18px 10px 6px;
}
.title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: clamp(2rem, 8vw, 3.2rem);
  background: linear-gradient(180deg, #FFE566 0%, #C8972A 60%, #8B5E00 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
  filter: drop-shadow(0 2px 8px rgba(255,200,0,0.5));
  letter-spacing: .15em;
}
.subtitle {
  font-size: .65rem;
  color: rgba(255,240,200,.45);
  letter-spacing: .35em;
  text-transform: uppercase;
  margin-top: 2px;
}
.divider {
  width: 180px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold2), transparent);
  margin: 10px auto 0;
}

.stats {
  display: flex; gap: 10px;
  padding: 10px 16px;
  width: 100%; max-width: 420px;
}
.stat {
  flex: 1;
  background: url('assets/ArtRes/Texture/btn.webp') center center / 100% 100% no-repeat;
  border: none;
  border-radius: 0;
  padding: 7px 10px;
  text-align: center;
}
.stat-label { font-size:.55rem; color:rgba(255,240,200,.45); letter-spacing:.25em; text-transform:uppercase; }
.stat-val { font-size:1.5rem; font-weight:900; color:var(--gold); line-height:1.1; font-family:'Ma Shan Zheng',cursive; }

.prog-wrap { width:100%; max-width:420px; padding:0 18px 6px; }
.prog-bg { height:7px; background:rgba(255,255,255,.07); border-radius:4px; overflow:hidden; }
.prog-fill {
  height:100%;
  background: linear-gradient(90deg, #FF6B35, #FFD700);
  border-radius:4px;
  transition: width .6s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 0 10px rgba(255,200,0,.6);
}

.legend {
  display:flex; gap:6px; flex-wrap:wrap;
  justify-content:center;
  padding:6px 16px 10px;
  max-width:420px;
  background: rgba(0,0,0,.35);
  backdrop-filter: blur(1px);
 
  border-radius: 14px;
  
}
.leg { display:flex; align-items:center; gap:3px; font-size:.6rem; color:rgba(255,240,200,.5); }
.leg span { font-size:.95rem; }

.board-wrap { position:relative; padding:6px; }
.board-outer {
  background: linear-gradient(135deg, #FFD700 0%, #8B6914 50%, #FFD700 100%);
  border-radius: 22px;
  padding: 4px;
  box-shadow: 0 0 50px rgba(255,200,0,.25), 0 0 100px rgba(255,200,0,.08), inset 0 1px 0 rgba(255,255,255,.2);
}
.board-inner {
  background: radial-gradient(ellipse at 30% 20%, #4A2200 0%, #2C1200 60%, #1A0800 100%);
  border-radius: 18px;
  padding: 10px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  position: relative;
  transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  touch-action: none;
}
.board-inner.combo-pulse {
  animation: board-pulse 0.32s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes board-pulse {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.032); }
  100% { transform: scale(1); }
}

/* ── BUBBLE CELL ── */
.cell {
  width: clamp(40px, 10.5vw, 54px);
  height: clamp(40px, 10.5vw, 54px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(1.3rem, 3.5vw, 1.8rem);
  cursor: pointer;
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform .12s ease;
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,255,.55) 0%, rgba(255,255,255,.08) 38%, transparent 62%),
    radial-gradient(circle at 65% 70%, rgba(255,255,255,.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.04) 0%, rgba(200,180,140,.08) 60%, rgba(150,120,60,.12) 100%);
  box-shadow:
    0 4px 16px rgba(0,0,0,.45),
    inset 0 -3px 8px rgba(0,0,0,.18),
    inset 0 3px 10px rgba(255,255,255,.35),
    0 0 0 1.5px rgba(255,255,255,.22),
    0 0 0 2.5px rgba(200,160,80,.15);

}

/* top-left glare spot */
.cell::before {
  content:'';
  position:absolute;
  top:10%; left:20%;
  width:38%; height:26%;
  background: rgba(255,255,255,.58);
  border-radius:50%;
  filter: none;
  opacity: 0.6;
  pointer-events:none;
}
/* bottom shadow arc */
.cell::after {
  content:'';
  position:absolute;
  bottom:9%; left:22%;
  width:56%; height:18%;
  background: rgba(0,0,0,.22);
  border-radius:50%;
  filter: none;
  opacity: 0.25;
  pointer-events:none;
}

.cell:hover { transform: scale(1.1); }
.cell:active { transform: scale(.94); }

.cell.selected {
  transform: scale(1.15);
  background:
    radial-gradient(circle at 32% 26%, rgba(255,255,255,.75) 0%, rgba(255,255,255,.2) 38%, transparent 62%),
    radial-gradient(circle at 50% 50%, rgba(255,240,180,.18) 0%, rgba(255,220,100,.1) 100%);
  box-shadow:
    0 0 0 3px rgba(255,255,255,.9),
    0 0 18px rgba(255,230,100,.8),
    0 0 40px rgba(255,200,0,.4),
    inset 0 -3px 8px rgba(0,0,0,.15),
    inset 0 3px 10px rgba(255,255,255,.5);
  animation: wobble .5s ease infinite alternate;
}
@keyframes wobble {
  from { transform: scale(1.13) rotate(-2deg); }
  to   { transform: scale(1.18) rotate(2deg); }
}

.cell.drag-target {
  box-shadow:
    0 0 0 3px rgba(255,255,255,.7),
    0 0 16px rgba(255,230,100,.6),
    inset 0 3px 10px rgba(255,255,255,.4);
  transform: scale(1.08);
  transition: transform .1s ease, box-shadow .1s ease;
}
.cell.shake {
  animation: shake 0.45s cubic-bezier(.36,.07,.19,.97) forwards;
}
@keyframes shake {
  0%,100% { transform: translateX(0) rotate(0deg); }
  15%  { transform: translateX(-6px) rotate(-4deg); }
  30%  { transform: translateX(6px)  rotate(3deg); }
  45%  { transform: translateX(-5px) rotate(-2deg); }
  60%  { transform: translateX(5px)  rotate(2deg); }
  75%  { transform: translateX(-3px) rotate(-1deg); }
  90%  { transform: translateX(3px)  rotate(1deg); }
}

@keyframes moves-warning {
  0%,100% { color: var(--gold); transform: scale(1); }
  50%     { color: #FF3B30; transform: scale(1.18); text-shadow: 0 0 12px rgba(255,60,40,.8); }
}
.moves-warning { animation: moves-warning .7s ease infinite; }

.cell.hint { animation: hint-bounce .45s ease infinite alternate; }
@keyframes hint-bounce {
  from { transform: scale(1) translateY(0); }
  to   { transform: scale(1.12) translateY(-5px); filter:brightness(1.3); }
}

@keyframes pop-out {
  0%   { transform:scale(1); opacity:1; }
  30%  { transform:scale(1.4); opacity:.9; filter:brightness(2.2) saturate(1.5); }
  70%  { transform:scale(1.6); opacity:.4; }
  100% { transform:scale(0.1); opacity:0; }
}
.cell.popping { animation: pop-out .38s cubic-bezier(.55,0,1,.45) forwards; }

@keyframes drop-in {
  0%   { transform:scale(.55) translateY(-18px); opacity:0; }
  65%  { transform:scale(1.1) translateY(4px); opacity:1; }
  100% { transform:scale(1) translateY(0); opacity:1; }
}
.cell.dropping { animation: drop-in .4s cubic-bezier(.34,1.56,.64,1) forwards; }

/* ── BRICK CELLS ── */
.cell.brick {
  background: #3A2410;
  border-radius: 10px !important;
  border: none;
  box-shadow:
    inset 2px 2px 4px rgba(255,200,120,.15),
    inset -2px -2px 4px rgba(0,0,0,.5),
    0 3px 10px rgba(0,0,0,.5);
  cursor: default;
  position: relative;
  overflow: hidden;
}
.cell.brick::before {
  content: '';
  position: absolute;
  inset: 0;
  display: none !important;
  background:
    repeating-linear-gradient(
      0deg, transparent 0px, transparent 8px,
      rgba(0,0,0,.25) 8px, rgba(0,0,0,.25) 9px
    ),
    repeating-linear-gradient(
      90deg, transparent 0px, transparent 12px,
      rgba(0,0,0,.2) 12px, rgba(0,0,0,.2) 13px
    );
  border-radius: 50%;
  filter: none;
  background-image: none;
  animation: none;
  opacity: 1;
  z-index: 1;
}
.cell.brick::after {
  content: '';
  position: absolute;
  inset: 0;
  display: none !important;
  background: rgba(0,0,0,.0);
  border-radius: 50%;
  filter: none;
}
.cell.brick-2 {
  background: linear-gradient(135deg, #8B6340 0%, #6B4C2A 40%, #4A3018 100%);
}
.cell.brick-1 {
  background: linear-gradient(135deg, #A07848 0%, #8B6340 40%, #6B4C2A 100%);
  box-shadow:
    inset 2px 2px 4px rgba(255,200,120,.2),
    inset -2px -2px 4px rgba(0,0,0,.4),
    0 3px 10px rgba(0,0,0,.4);
}
.cell.brick-1::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background:
    linear-gradient(42deg, transparent 48%, rgba(255,220,150,.35) 49%, transparent 50%),
    linear-gradient(128deg, transparent 45%, rgba(255,220,150,.25) 46.5%, transparent 47.5%),
    repeating-linear-gradient(0deg, transparent 0px, transparent 8px, rgba(0,0,0,.2) 8px, rgba(0,0,0,.2) 9px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 12px, rgba(0,0,0,.18) 12px, rgba(0,0,0,.18) 13px);
}
@keyframes brick-hit {
  0%   { transform: scale(1); filter: brightness(1); }
  25%  { transform: scale(1.12); filter: brightness(2.2); }
  50%  { transform: scale(0.95); filter: brightness(1.4); }
  100% { transform: scale(1); filter: brightness(1); }
}
.cell.brick-hit { animation: brick-hit 0.35s ease forwards; }


/* ── OBSTACLE INDICATOR (corner badge) ── */
.cell.brick .obstacle-badge,
.cell.ice .obstacle-badge {
  position: absolute;
  bottom: 3px; right: 4px;
  font-size: .55rem;
  line-height: 1;
  pointer-events: none;
  z-index: 2;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.7));
}

/* ── POWERUP BUBBLES ── */
.cell.pw-row, .cell.pw-col {
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.85) 0%, rgba(255,255,255,.3) 30%, transparent 60%),
    radial-gradient(circle at 50% 50%, #FFE066 0%, #C8820A 55%, #7A4A00 100%);
  border: none;
  box-shadow:
    0 0 0 2.5px #FFD700,
    0 0 12px 4px rgba(255,210,0,.7),
    0 0 28px 8px rgba(255,180,0,.35),
    inset 0 3px 10px rgba(255,255,255,.5),
    inset 0 -3px 8px rgba(150,80,0,.4);
  animation: pw-gold-pulse 0.8s ease-in-out infinite alternate;
}
.cell.pw-row::after, .cell.pw-col::after {
  background: rgba(255,230,80,.25);
  border-radius: 50%;
}

.cell.pw-bomb {
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.85) 0%, rgba(255,200,100,.3) 30%, transparent 60%),
    radial-gradient(circle at 50% 50%, #FF9900 0%, #CC2200 55%, #6A0000 100%);
  border: none;
  box-shadow:
    0 0 0 2.5px #FF6600,
    0 0 14px 5px rgba(255,80,0,.75),
    0 0 32px 10px rgba(200,40,0,.4),
    inset 0 3px 10px rgba(255,200,100,.5),
    inset 0 -3px 8px rgba(100,0,0,.4);
  animation: pw-bomb-throb 0.6s ease-in-out infinite alternate;
}

.cell.pw-color {
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.9) 0%, rgba(255,255,255,.25) 32%, transparent 60%),
    conic-gradient(from 0deg at 50% 50%,
      #FF4444 0deg, #FF9900 60deg, #FFE500 120deg,
      #44FF88 180deg, #44AAFF 240deg, #CC44FF 300deg, #FF4444 360deg);
  border: none;
  box-shadow:
    0 0 0 2.5px rgba(255,255,255,.9),
    0 0 16px 6px rgba(255,200,0,.65),
    0 0 36px 12px rgba(200,100,255,.35),
    inset 0 3px 12px rgba(255,255,255,.55),
    inset 0 -3px 8px rgba(0,0,0,.2);
  animation: pw-rainbow-spin 1.4s linear infinite;
}

@keyframes pw-gold-pulse {
  from {
    box-shadow: 0 0 0 2px #FFD700, 0 0 8px 3px rgba(255,200,0,.5), 0 0 20px 6px rgba(255,160,0,.25),
                inset 0 3px 10px rgba(255,255,255,.5), inset 0 -3px 8px rgba(150,80,0,.4);
    transform: scale(1);
  }
  to {
    box-shadow: 0 0 0 3px #FFE566, 0 0 18px 7px rgba(255,220,0,.85), 0 0 40px 14px rgba(255,180,0,.45),
                inset 0 3px 10px rgba(255,255,255,.6), inset 0 -3px 8px rgba(150,80,0,.4);
    transform: scale(1.06);
  }
}
@keyframes pw-bomb-throb {
  from {
    box-shadow: 0 0 0 2px #FF6600, 0 0 10px 4px rgba(255,80,0,.6), 0 0 22px 8px rgba(200,40,0,.3),
                inset 0 3px 10px rgba(255,200,100,.5), inset 0 -3px 8px rgba(100,0,0,.4);
    transform: scale(1);
  }
  to {
    box-shadow: 0 0 0 3px #FF9900, 0 0 20px 8px rgba(255,100,0,.9), 0 0 44px 16px rgba(220,60,0,.5),
                inset 0 3px 10px rgba(255,220,120,.6), inset 0 -3px 8px rgba(100,0,0,.4);
    transform: scale(1.08);
  }
}
@keyframes pw-rainbow-spin {
  from { filter: hue-rotate(0deg) brightness(1.2) saturate(1.4); transform: scale(1); }
  50%  { transform: scale(1.07); }
  to   { filter: hue-rotate(360deg) brightness(1.35) saturate(1.6); transform: scale(1); }
}

/* ── PARTICLE CANVAS ── */
#burst-canvas {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:500;
}

/* ── CONFETTI CANVAS (on top of overlay) ── */
#confetti-canvas {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  z-index:920;
}

/* ── COMBO TOAST ── */
.combo-toast {
  position:fixed; top:38%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(1.8rem,6vw,3rem);
  color:#fff;
  text-shadow:0 0 20px #FFD700,0 0 40px #FF6B35,0 2px 4px rgba(0,0,0,.6);
  pointer-events:none; z-index:600;
  white-space:nowrap;
  animation:toast-pop 1.6s ease forwards;
}
@keyframes toast-pop {
  0%   { opacity:0; transform:translate(-50%,-50%) scale(.4) rotate(-8deg); }
  20%  { opacity:1; transform:translate(-50%,-50%) scale(1.15) rotate(3deg); }
  65%  { opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0deg); }
  100% { opacity:0; transform:translate(-50%,-140%) scale(.8); }
}

.score-pop {
  position:fixed;
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.5rem; font-weight:900;
  color:var(--gold);
  text-shadow:0 0 10px rgba(255,200,0,.8),0 0 25px rgba(255,200,0,.4);
  pointer-events:none; z-index:550;
  animation:score-rise 1.1s ease forwards;
}
@keyframes score-rise {
  0%   { opacity:1; transform:translateY(0) scale(.8); }
  100% { opacity:0; transform:translateY(-65px) scale(1.1); }
}

/* ── OVERLAY ── */
.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.88);
  display:flex; align-items:center; justify-content:center;
  z-index:900;
  backdrop-filter:blur(6px);
  opacity:0; pointer-events:none;
  transition:opacity .35s;
}
.overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:linear-gradient(145deg,#2C1200,#1A0800);
  border:2px solid var(--gold2);
  border-radius:22px;
  padding:36px 44px; text-align:center; max-width:300px;
  box-shadow:0 0 60px rgba(255,200,0,.35),0 0 120px rgba(255,200,0,.1);
  transform:scale(.85);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.overlay.show .modal { transform:scale(1); }
.modal-icon { font-size:3.5rem; margin-bottom:10px; }
.modal-title { font-family:'Ma Shan Zheng',cursive; font-size:2rem; color:var(--gold); margin-bottom:8px; }
.modal-text { font-size:.85rem; color:rgba(255,240,200,.7); line-height:1.7; margin-bottom:22px; }
.btn {
  background:linear-gradient(135deg,#FFD700,#C8972A);
  color:var(--dark); border:none;
  padding:11px 32px; border-radius:30px;
  font-family:'Noto Serif TC',serif;
  font-size:1rem; font-weight:700; cursor:pointer;
  box-shadow:0 4px 16px rgba(255,200,0,.4);
  transition:all .2s;
}
.btn:hover { transform:translateY(-2px) scale(1.04); box-shadow:0 8px 24px rgba(255,200,0,.6); }

.level-label { font-size:.65rem; color:rgba(255,240,200,.35); letter-spacing:.15em; text-align:center; padding-bottom:4px; }
.hint-btn {
  background: url('assets/ArtRes/Texture/btn2.webp') center center / 100% 100% no-repeat;
  border: none;
  color: rgba(255,240,200,.45);
  padding: 5px 18px;
  border-radius: 20px;
  font-size: .7rem;
  cursor: pointer;
  margin: 6px;
  font-family: 'Noto Serif TC', serif;
  transition: all .2s;
}
.hint-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
}
.hint-btn.pw-available {
  border-color: rgba(255,200,0,.8);
  color: var(--gold);
  box-shadow:
    0 0 8px rgba(255,200,0,.5),
    0 0 16px rgba(255,180,0,.25);
  animation: guide-glow .9s ease-in-out infinite alternate;
}
@keyframes guide-glow {
  from {
    box-shadow: 0 0 6px rgba(255,200,0,.4), 0 0 12px rgba(255,160,0,.2);
    border-color: rgba(255,200,0,.6);
    color: rgba(255,220,100,.8);
  }
  to {
    box-shadow: 0 0 14px rgba(255,220,0,.85), 0 0 28px rgba(255,180,0,.45);
    border-color: rgba(255,230,80,1);
    color: #FFE566;
  }
}

/* ── POWERUP GUIDE MODAL ── */
.pw-guide-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.82);
  display:flex; align-items:center; justify-content:center;
  z-index:950;
  backdrop-filter:blur(6px);
  opacity:0; pointer-events:none;
  transition:opacity .3s;
}
.pw-guide-overlay.show { opacity:1; pointer-events:all; }
.pw-guide-box {
  background:linear-gradient(145deg,#2C1200,#1A0800);
  border:2px solid var(--gold2);
  border-radius:22px;
  padding:28px 32px;
  max-width:310px; width:90%;
  box-shadow:0 0 60px rgba(255,200,0,.35);
  transform:scale(.88);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1);
}
.pw-guide-overlay.show .pw-guide-box { transform:scale(1); }
.pw-guide-title {
  font-family:'Ma Shan Zheng',cursive;
  font-size:1.5rem; color:var(--gold);
  text-align:center; margin-bottom:18px;
  letter-spacing:.1em;
}
.pw-guide-row {
  display:flex; align-items:flex-start; gap:12px;
  margin-bottom:14px;
}
.pw-guide-icon {
  font-size:1.6rem; flex-shrink:0;
  width:44px; height:44px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
}
.pw-guide-icon.gold {
  background:radial-gradient(circle at 35% 30%, #FFE066, #C8820A);
  box-shadow:0 0 10px rgba(255,200,0,.6);
}
.pw-guide-icon.red {
  background:radial-gradient(circle at 35% 30%, #FF9900, #CC2200);
  box-shadow:0 0 10px rgba(255,80,0,.6);
}
.pw-guide-icon.rainbow {
  background:conic-gradient(#FF4444,#FF9900,#FFE500,#44FF88,#44AAFF,#CC44FF,#FF4444);
  box-shadow:0 0 10px rgba(200,100,255,.5);
}
.pw-guide-desc { flex:1; }
.pw-guide-desc strong {
  display:block; color:var(--gold);
  font-size:.85rem; margin-bottom:3px;
}
.pw-guide-desc span {
  font-size:.75rem; color:rgba(255,240,200,.65);
  line-height:1.5;
}
.pw-free-badge {
  display:inline-block;
  background:linear-gradient(135deg,#FFD700,#C8972A);
  color:#1A0800; font-size:.55rem; font-weight:900;
  padding:1px 6px; border-radius:8px;
  vertical-align:middle; margin-left:4px;
  letter-spacing:.05em;
}
.pw-guide-close {
  width:100%; margin-top:18px;
  background:linear-gradient(135deg,#FFD700,#C8972A);
  color:var(--dark); border:none;
  padding:10px 0; border-radius:30px;
  font-family:'Noto Serif TC',serif;
  font-size:.95rem; font-weight:700; cursor:pointer;
  box-shadow:0 4px 14px rgba(255,200,0,.4);
  transition:all .2s;
}
.pw-guide-close:hover { transform:translateY(-2px); box-shadow:0 7px 20px rgba(255,200,0,.6); }

.stat.free-move { border-color:rgba(255,200,0,.7); background:rgba(255,200,0,.14); }
.stat.free-move .stat-label { color:rgba(255,220,100,.8); }
.stat.free-move .stat-val { color:#FFE566; }

/* ── ICE CELL — hide base bubble, show only sprite ── */
.cell.ice {
  background: transparent !important;
  box-shadow: none !important;
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  cursor: default; /* FIX: show not-allowed cursor for ice */
}
.cell.ice::before,
.cell.ice::after {
  display: none !important;
}

/* ── ICON SPRITE SHEET ── */
.cell-icon {
  position: absolute;
  inset: 0;
  background-image: url('assets/ArtRes/Texture/ICON_00.webp');
  background-size: 700% 100%;
  background-repeat: no-repeat;
  pointer-events: none;
  z-index: 1;
}
.cell-icon[data-i="0"] { background-position: 0%      0%; }
.cell-icon[data-i="1"] { background-position: 16.67%  0%; }
.cell-icon[data-i="2"] { background-position: 33.33%  0%; }
.cell-icon[data-i="3"] { background-position: 50%     0%; }
.cell-icon[data-i="4"] { background-position: 66.67%  0%; }
.cell-icon[data-i="5"] { background-position: 83.33%  0%; }
.cell-icon[data-i="6"] { background-position: 100%    0%; }


/* ── OBSTACLE SPRITE DIV ── */
.obs-sprite {
  position: absolute;
  inset: -35px !important;
  top: -35px !important;
  left: -35px !important;
  border-radius: 80%;
  pointer-events: none;
  background-repeat: no-repeat;
  z-index: 5;
  overflow: hidden;
}
.obs-sprite.ice-2 {
  background-image: url('assets/ArtRes/Texture/ice.webp');
  background-size: 200% 100%;
  background-position: 0% 0%;
  animation: ice-pulse 2s ease-in-out infinite alternate;
}
.obs-sprite.ice-1 {
  background-image: url('assets/ArtRes/Texture/ice.webp');
  background-size: 200% 100%;
  background-position: 100% 0%;
  opacity: .9;
}
@keyframes ice-pulse {
  from { opacity: .82; }
  to   { opacity: 1; filter: brightness(1.1); }
}
@keyframes ice-hit-anim {
  0%   { background-position: 0%   0%; opacity: 1; }
  33%  { background-position: 50%  0%; opacity: 1; }
  66%  { background-position: 100% 0%; opacity: .7; }
  100% { background-position: 100% 0%; opacity: 0; }
}
.obs-sprite.ice-hit {
  background-image: url('assets/ArtRes/Texture/fx_ice.webp');
  background-size: 300% 100%;
  animation: ice-hit-anim 0.4s steps(1,end) forwards !important;
}

.obs-sprite.brick-hp2,
.obs-sprite.brick-hp1 {
  inset: -40px !important;
  top: -40px !important;
  left: -40px !important;
  border-radius: 8px;
  overflow: hidden;
}
.obs-sprite.brick-hp2 {
  background-image: url('assets/ArtRes/Texture/rock.webp');
  background-size: 200% 100%;
  background-position: 0% 0%;
}
.obs-sprite.brick-hp1 {
  background-image: url('assets/ArtRes/Texture/rock.webp');
  background-size: 200% 100%;
  background-position: 100% 0%;
}

.obs-sprite.brick-breaking {
  background-image: url('assets/ArtRes/Texture/fx_rock.webp');
  background-size: 300% 100%;
  background-position: 0% 0%;
  animation: stone-break-anim 0.45s steps(1,end) forwards;
}
@keyframes stone-break-anim {
  0%   { background-position: 0%   0%; opacity: 1; }
  33%  { background-position: 50%  0%; opacity: 1; }
  66%  { background-position: 100% 0%; opacity: .8; }
  100% { background-position: 100% 0%; opacity: 0; }
}
</style>
</head>
<body>

<canvas id="burst-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<!-- POWERUP GUIDE MODAL -->
<div class="pw-guide-overlay" id="pwGuide">
  <div class="pw-guide-box">
    <div class="pw-guide-title">✨ 特殊道具說明</div>
    <div class="pw-guide-row">
      <div class="pw-guide-icon gold">✨</div>
      <div class="pw-guide-desc">
        <strong>閃耀高粱 — 行列消除<span class="pw-free-badge">免費</span></strong>

      </div>
    </div>
    <div class="pw-guide-row">
      <div class="pw-guide-icon red">💥</div>
      <div class="pw-guide-desc">
        <strong>砲彈爆炸 — 範圍清除<span class="pw-free-badge">免費</span></strong>
        <span>T型或L型消除產生。爆炸清除周圍 3×3！</span>
      </div>
    </div>
    <div class="pw-guide-row">
      <div class="pw-guide-icon rainbow">🌀</div>
      <div class="pw-guide-desc">
        <strong>金門貢糖 — 全色消除<span class="pw-free-badge">免費</span></strong>
        <span>5連消產生。拖到任意泡泡旁，消除畫面上所有同色！</span>
      </div>
    </div>
    <div style="font-size:.7rem;color:rgba(255,220,100,.6);text-align:center;margin-top:4px;margin-bottom:2px;">
      所有道具激活皆不消耗步數 🎁
    </div>
    <button class="pw-guide-close" id="pwGuideClose">明白了！開始消消樂 🎮</button>
  </div>

<script>
// 偵測手機，降低特效品質
const IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const MAX_PARTICLES = IS_MOBILE ? 80 : 400;
const BURST_COUNT_SCALE = IS_MOBILE ? 0.35 : 1.0;


// ── CONSTANTS ──
const EMOJIS  = [0,1,2,3,4,5,6];
const BCOLORS = [
  '#E8A020', '#E84040', '#4A90D9', '#5CB85C',
  '#FF8C42', '#8B5CF6', '#D4A853',
];
const COLS=7, ROWS=7;
const LEVELS=[
  {name:'金城鎮', target:500,  moves:20, bricks:0,  ices:0 },
  {name:'山外鎮', target:1000, moves:20, bricks:0,  ices:0 },
  {name:'烈嶼島', target:1800, moves:22, bricks:0,  ices:5 },
  {name:'太武山', target:2800, moves:24, bricks:5,  ices:3 },
  {name:'古寧頭', target:4200, moves:26, bricks:6,  ices:6 },
];

const PW = Object.freeze({ROW:'row', COL:'col', BOMB:'bomb', COLOR:'color'});
const PW_EMOJI = {[PW.ROW]:'✨',[PW.COL]:'✨',[PW.BOMB]:'💥',[PW.COLOR]:'🌀'};

const TIMING = Object.freeze({
  POP:   IS_MOBILE ? 300 : 370,
  DROP:  IS_MOBILE ? 360 : 460,
  SHAKE: 480,
  HINT:  1600,
  IDLE:  5000,
  FREE_TOAST: 1500,
  SHUFFLE_FADE: 260,
});

// ── STATE ──
const state = { board:[], selected:null, score:0, moves:0, level:0, animating:false, comboChain:0 };
function syncState(){}

const lv=()=>LEVELS[Math.min(state.level,LEVELS.length-1)];

// ── AUDIO ──
let audioCtx=null;
function getAudioCtx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playNote(freq,duration=0.15){
  try{
    const ac=getAudioCtx();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(freq,ac.currentTime);
    gain.gain.setValueAtTime(0.18,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime+duration);
  }catch(e){}
}
const NOTES=[261.6,293.7,329.6,392,440,523.3,587.3,659.3];
function playComboNote(chain){
  const idx=Math.min(chain,NOTES.length-1);
  playNote(NOTES[idx],0.18);
}
function playPopSound(){playNote(440,0.08);}
function playErrorSound(){
  try{
    const ac=getAudioCtx();
    const osc=ac.createOscillator();
    const gain=ac.createGain();
    osc.connect(gain);gain.connect(ac.destination);
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(150,ac.currentTime);
    gain.gain.setValueAtTime(0.1,ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.12);
    osc.start();osc.stop(ac.currentTime+0.12);
  }catch(e){}
}

// ── HAPTICS ──
function vibrate(ms){try{navigator.vibrate&&navigator.vibrate(ms);}catch(e){}}

// ── PARTICLE ENGINE ──
const cvs=document.getElementById('burst-canvas');
const ctx2d=cvs.getContext('2d');
let particles=[],rafId=null;
function resizeCvs(){cvs.width=window.innerWidth;cvs.height=window.innerHeight;}
resizeCvs();
window.addEventListener('resize',resizeCvs);

function spawnBurst(x,y,color,count=18){
  count = Math.round(count * BURST_COUNT_SCALE);
  if(particles.length >= MAX_PARTICLES) return;
  count = Math.min(count, MAX_PARTICLES - particles.length);
  for(let i=0;i<count;i++){
    const a=(Math.PI*2*i/count)+(Math.random()-.5)*.9;
    const spd=2.8+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,r:3+Math.random()*5.5,color,alpha:1,decay:.022+Math.random()*.018});
  }
  for(let i=0;i<3;i++)
    particles.push({x,y,ringR:2+i*4,ringSpeed:3.5+i*1.2,color,alpha:.9,decay:.03+i*.01,isRing:true});
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2,spd=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-3,r:1.5,color:'#fff',alpha:1,decay:.03,isStar:true});
  }
  if(!rafId)tickParticles();
}
function tickParticles(){
  ctx2d.clearRect(0,0,cvs.width,cvs.height);
  particles=particles.filter(p=>p.alpha>0.01);
  for(const p of particles){
    ctx2d.save();ctx2d.globalAlpha=p.alpha;
    if(p.isRing){
      p.ringR+=p.ringSpeed;p.ringSpeed*=.93;
      ctx2d.strokeStyle=p.color;ctx2d.lineWidth=3*p.alpha;
      ctx2d.beginPath();ctx2d.arc(p.x,p.y,p.ringR,0,Math.PI*2);ctx2d.stroke();
    }else if(p.isStar){
      p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.vx*=.96;
      ctx2d.fillStyle=p.color;
      const s=p.r*2;
      ctx2d.beginPath();
      ctx2d.moveTo(p.x,p.y-s);ctx2d.lineTo(p.x+s*.25,p.y-s*.25);ctx2d.lineTo(p.x+s,p.y);
      ctx2d.lineTo(p.x+s*.25,p.y+s*.25);ctx2d.lineTo(p.x,p.y+s);ctx2d.lineTo(p.x-s*.25,p.y+s*.25);
      ctx2d.lineTo(p.x-s,p.y);ctx2d.lineTo(p.x-s*.25,p.y-s*.25);ctx2d.closePath();ctx2d.fill();
    }else{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.2;p.vx*=.97;
      const g=ctx2d.createRadialGradient(p.x-p.r*.35,p.y-p.r*.35,0,p.x,p.y,p.r);
      g.addColorStop(0,'rgba(255,255,255,.85)');g.addColorStop(.35,p.color);g.addColorStop(1,'rgba(0,0,0,.15)');
      ctx2d.fillStyle=g;ctx2d.beginPath();ctx2d.arc(p.x,p.y,p.r,0,Math.PI*2);ctx2d.fill();
    }
    p.alpha-=p.decay;ctx2d.restore();
  }
  rafId=particles.length>0?requestAnimationFrame(tickParticles):null;
}

document.getElementById('board').addEventListener('touchmove', e => {
  e.preventDefault();
}, { passive: false });

// ── BOARD INIT ──
function init(){
  state.score=0;state.moves=lv().moves;state.selected=null;state.animating=false;state.comboChain=0;syncState();
  updateStats();
  generateBoard();updateLevelLabel();render();updateGuideBtnGlow();resetIdleTimer();
}

function generateBoard(){
  state.board=[];
  for(let r=0;r<ROWS;r++){
    state.board[r]=[];
    for(let c=0;c<COLS;c++){
      const avoid=new Set();
      if(c>=2&&state.board[r][c-1]&&state.board[r][c-2]&&state.board[r][c-1].t===state.board[r][c-2].t) avoid.add(state.board[r][c-1].t);
      if(r>=2&&state.board[r-1]&&state.board[r-2]&&state.board[r-1][c]&&state.board[r-2][c]&&state.board[r-1][c].t===state.board[r-2][c].t) avoid.add(state.board[r-1][c].t);
      const pool=[];
      for(let i=0;i<EMOJIS.length;i++){if(!avoid.has(i))pool.push(i);}
      const t=pool.length>0?pool[Math.floor(Math.random()*pool.length)]:Math.floor(Math.random()*EMOJIS.length);
      state.board[r][c]={t,pw:null};
    }
  }
  for(let attempt=0;attempt<20&&!hasValidMoves();attempt++) shuffleData();
  placeObstacles();
}

function placeObstacles(){
  const lvCfg=lv();
  const bricks=lvCfg.bricks||0;
  const ices=lvCfg.ices||0;
  if(bricks===0&&ices===0)return;

  const candidates=[];
  for(let r=1;r<ROWS-1;r++)
    for(let c=1;c<COLS-1;c++)
      candidates.push(r*100+c);

  for(let i=candidates.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [candidates[i],candidates[j]]=[candidates[j],candidates[i]];
  }

  let placed=0;
  for(let i=0;i<candidates.length&&placed<ices;i++){
    const r=Math.floor(candidates[i]/100),c=candidates[i]%100;
    const tile=state.board[r][c];
    if(tile&&!tile.obs){
      tile.obs='ice'; tile.hp=2;
      placed++;
    }
  }
  placed=0;
  for(let i=Math.floor(candidates.length/2);i<candidates.length&&placed<bricks;i++){
    const r=Math.floor(candidates[i]/100),c=candidates[i]%100;
    const tile=state.board[r][c];
    if(tile&&!tile.obs){
      tile.obs='brick'; tile.hp=2; tile.t=-1;
      placed++;
    }
  }
}

function shuffleData(){
  const flat=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(state.board[r][c])flat.push(state.board[r][c]);
  for(let i=flat.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const tmp=flat[i];flat[i]=flat[j];flat[j]=tmp;}
  let idx=0;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)state.board[r][c]=flat[idx++]||null;
}

// ── DOM CACHE ──
let cellEls = [];
function getCell(r,c){ return cellEls[r]?.[c] ?? null; }

function applyCellContent(el, tile){
  const pwClasses = ['pw-row','pw-col','pw-bomb','pw-color'];
  const obsClasses = ['brick','brick-2','brick-1','ice','ice-2','ice-1'];
  el.classList.remove(...pwClasses,...obsClasses,'popping');
  if(el.children.length>0)
    el.querySelectorAll('.obstacle-badge,.obs-sprite,.cell-icon').forEach(b=>b.remove());

  if(!tile){ el.textContent=''; el.dataset.type=''; return; }

  if(tile.obs==='brick'){
    el.textContent='';
    el.dataset.type='brick';
    el.classList.add('brick');
    const sprite=document.createElement('div');
    sprite.className='obs-sprite brick-intact '+(tile.hp===2?'brick-hp2':'brick-hp1');
    el.appendChild(sprite);
    return;
  }

  el.dataset.type = tile.t;
  if(tile.pw){
    el.textContent = PW_EMOJI[tile.pw];
    el.classList.add('pw-'+tile.pw);
  } else if(tile.t >= 0){
    el.textContent = '';
    const icon = document.createElement('div');
    icon.className = 'cell-icon';
    icon.dataset.i = tile.t;
    el.appendChild(icon);
  } else {
    el.textContent = '';
  }

  if(tile.obs==='ice'){
    el.classList.add('ice');
    const sprite=document.createElement('div');
    sprite.className='obs-sprite '+(tile.hp===2?'ice-2':'ice-1');
    el.appendChild(sprite);
    const badge=document.createElement('span');
    badge.className='obstacle-badge';
    badge.textContent=tile.hp===2?'❄️':'🌊';
    el.appendChild(badge);
  }
}

// ── RENDER ──
function render(){
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  cellEls = [];
  for(let r=0;r<ROWS;r++){
    cellEls[r] = [];
    for(let c=0;c<COLS;c++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;
      applyCellContent(cell, state.board[r][c]);
      cell.addEventListener('pointerdown',(e)=>onPointerDown(e,r,c));
      boardEl.appendChild(cell);
      cellEls[r][c] = cell;
    }
  }
  const sel = state.selected;
  if(sel) getCell(sel.r, sel.c)?.classList.add('selected');
}

function updateCell(r,c){
  const el = getCell(r,c);
  if(!el) return;
  applyCellContent(el, state.board[r][c]);
}

// ── DRAG ──
let dragStart=null,dragEl=null,dragClone=null,pointerMoved=false;
let previewSwapped=false;

function onPointerDown(e,r,c){
  if(state.animating||!state.board[r][c])return;
  // FIX: Block interaction with ice and brick tiles
  if(state.board[r][c].obs==='ice'||state.board[r][c].obs==='brick'){
    // Show a shake to indicate it can't be moved
    const el=getCell(r,c);
    if(el){
      el.classList.remove('shake');void el.offsetWidth;
      el.classList.add('shake');
      setTimeout(()=>el.classList.remove('shake'),TIMING.SHAKE);
    }
    playErrorSound();vibrate(20);
    return;
  }
  e.preventDefault();
  e.stopPropagation();
  dragStart={r,c,x:e.clientX,y:e.clientY};
  pointerMoved=false;previewSwapped=false;
  const srcEl=getCell(r,c);
  if(srcEl){
    const rect=srcEl.getBoundingClientRect();
    dragEl=srcEl;
    dragClone=srcEl.cloneNode(true);
    dragClone.style.cssText=`
      position:fixed;left:${rect.left}px;top:${rect.top}px;
      width:${rect.width}px;height:${rect.height}px;
      pointer-events:none;z-index:999;transition:none;
      box-shadow:0 8px 30px rgba(0,0,0,.6),0 0 0 3px rgba(255,255,255,.9),0 0 20px rgba(255,230,100,.7);
      transform:scale(1.2);border-radius:50%;`;
    document.body.appendChild(dragClone);
    srcEl.style.opacity='.3';
  }
  window.addEventListener('pointermove',onPointerMove,{passive:false});
  window.addEventListener('pointerup',onPointerUp,{once:true});
}

function onPointerMove(e){
  if(!dragStart||!dragClone)return;
  e.preventDefault();
  const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
  if(Math.abs(dx)+Math.abs(dy)>4)pointerMoved=true;

  const srcEl=getCell(dragStart.r,dragStart.c);
  if(srcEl){
    const rect=srcEl.getBoundingClientRect();
    dragClone.style.left=(rect.left+dx)+'px';
    dragClone.style.top=(rect.top+dy)+'px';
  }

  const target=getTargetFromDelta(dragStart.r,dragStart.c,dx,dy);
  document.querySelectorAll('.cell.drag-target').forEach(el=>el.classList.remove('drag-target'));

  const cellPx=getCellPx();
  const dist=Math.sqrt(dx*dx+dy*dy);
  const snapped=dist>cellPx*0.55&&target;

  if(target){
    // FIX: Don't show drag-target highlight on obstacle tiles
    const targetTile=state.board[target.r]?.[target.c];
    if(!targetTile?.obs){
      const tel=getCell(target.r,target.c);
      if(tel)tel.classList.add('drag-target');
    }

    if(snapped&&!previewSwapped){
      previewSwapped=true;
      const {r,c}=dragStart;
      const nr=target.r,nc=target.c;
      const tEl=getCell(nr,nc);
      if(tEl&&!targetTile?.obs){
        const dirX=(c-nc)*cellPx*0.35;
        const dirY=(r-nr)*cellPx*0.35;
        tEl.style.transition='transform 0.12s ease';
        tEl.style.transform=`translate(${dirX}px,${dirY}px)`;
      }
    }else if(!snapped&&previewSwapped){
      previewSwapped=false;
      if(target){
        const tEl=getCell(target.r,target.c);
        if(tEl){tEl.style.transition='transform 0.12s ease';tEl.style.transform='';}
      }
    }
  }
}

function onPointerUp(e){
  window.removeEventListener('pointermove',onPointerMove);
  document.querySelectorAll('.cell.drag-target').forEach(el=>{
    el.classList.remove('drag-target');
    el.style.transition='';el.style.transform='';
  });
  if(!dragStart){cleanDrag();return;}
  const dx=e.clientX-dragStart.x,dy=e.clientY-dragStart.y;
  const {r,c}=dragStart;
  cleanDrag();
  if(!pointerMoved){onClick(r,c);}
  else{
    const target=getTargetFromDelta(r,c,dx,dy);
    if(target){state.selected=null;trySwap(r,c,target.r,target.c);}
    else{state.selected=null;render();}
  }
  dragStart=null;pointerMoved=false;previewSwapped=false;
}

function getCellPx(){
  const s=document.querySelector('.cell');
  const b=document.getElementById('board');
  if(!s||!b)return 50;
  const gap=parseFloat(getComputedStyle(b).gap)||5;
  return s.getBoundingClientRect().height+gap;
}

function getTargetFromDelta(r,c,dx,dy){
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return null;
  if(Math.abs(dx)>=Math.abs(dy)){
    const nc=c+(dx>0?1:-1);
    if(nc>=0&&nc<COLS)return{r,c:nc};
  }else{
    const nr=r+(dy>0?1:-1);
    if(nr>=0&&nr<ROWS)return{r:nr,c};
  }
  return null;
}
function cleanDrag(){
  if(dragClone){dragClone.remove();dragClone=null;}
  if(dragEl){dragEl.style.opacity='';dragEl=null;}
}

// ── CLICK ──
function onClick(r,c){
  if(state.animating||!state.board[r][c])return;
  // FIX: Block clicking on obstacle tiles
  if(state.board[r][c].obs==='ice'||state.board[r][c].obs==='brick'){
    const el=getCell(r,c);
    if(el){
      el.classList.remove('shake');void el.offsetWidth;
      el.classList.add('shake');
      setTimeout(()=>el.classList.remove('shake'),TIMING.SHAKE);
    }
    playErrorSound();vibrate(20);
    state.selected=null;render();
    return;
  }
  resetIdleTimer();
  if(!state.selected){state.selected={r,c};render();return;}
  if(state.selected.r===r&&state.selected.c===c){state.selected=null;render();return;}
  const dr=Math.abs(r-state.selected.r),dc=Math.abs(c-state.selected.c);
  if((dr===1&&dc===0)||(dr===0&&dc===1)){trySwap(state.selected.r,state.selected.c,r,c);}
  else{state.selected={r,c};render();}
}

// ── SWAP ──
function trySwap(r1,c1,r2,c2){
  const t1=state.board[r1][c1],t2=state.board[r2][c2];

  // FIX: Bricks AND ice tiles can't be swapped
  if(t1?.obs==='brick'||t2?.obs==='brick'||t1?.obs==='ice'||t2?.obs==='ice'){
    [getCell(r1,c1),getCell(r2,c2)].forEach(el=>{
      if(!el)return;
      el.classList.remove('shake');void el.offsetWidth;
      el.classList.add('shake');
      setTimeout(()=>el.classList.remove('shake'),TIMING.SHAKE);
    });
    playErrorSound();vibrate(30);
    state.selected=null;render();return;
  }

  // Special: color powerup swapped with any tile
  if(t1&&t1.pw===PW.COLOR){activateColor(r1,c1,t2.t,r2,c2);return;}
  if(t2&&t2.pw===PW.COLOR){activateColor(r2,c2,t1.t,r1,c1);return;}

  [state.board[r1][c1],state.board[r2][c2]]=[state.board[r2][c2],state.board[r1][c1]];
  if(findMatches().length===0&&!state.board[r1][c1]?.pw&&!state.board[r2][c2]?.pw){
    [state.board[r1][c1],state.board[r2][c2]]=[state.board[r2][c2],state.board[r1][c1]];
    [getCell(r1,c1),getCell(r2,c2)].forEach(el=>{
      if(!el)return;
      el.classList.remove('shake');void el.offsetWidth;
      el.classList.add('shake');
      setTimeout(()=>el.classList.remove('shake'),TIMING.SHAKE);
    });
    playErrorSound();vibrate(30);
    state.selected=null;render();return;
  }
  const usingPowerup=state.board[r1][c1]?.pw||state.board[r2][c2]?.pw;
  if(!usingPowerup) state.moves--;
  state.selected=null;state.animating=true;syncState();updateStats();resetIdleTimer();
  if(usingPowerup) showFreeMoveToast();
  vibrate(10);
  render();
  runCascade();
}

// ── COLOR POWERUP ACTIVATION ──
function activateColor(pwR,pwC,targetType,swapR,swapC){
  state.animating=true;syncState();updateStats();
  showFreeMoveToast();
  vibrate([10,20,10]);
  const toRemove=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
    if(state.board[r][c]&&state.board[r][c].t===targetType)toRemove.push({r,c});
  toRemove.push({r:pwR,c:pwC});

  toRemove.forEach(({r,c})=>{
    const el=getCell(r,c);
    if(el){
      el.classList.add('popping');
      const rect=el.getBoundingClientRect();
      spawnBurst(rect.left+rect.width/2,rect.top+rect.height/2,BCOLORS[targetType],22);
    }
  });
  showComboToast(99);
  const pts=toRemove.length*50;
  state.score+=pts;updateStats();
  showScorePop(pts,toRemove);
  playComboNote(7);

  setTimeout(()=>{
    toRemove.forEach(({r,c})=>{state.board[r][c]=null;});
    applyGravity();
    setTimeout(()=>runCascade(),TIMING.DROP);
  },380);
}

// ── MATCH DETECTION ──
function findMatches(){
  const matched=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;c++){
      if(!state.board[r][c]||state.board[r][c].pw||state.board[r][c].obs)continue;
      if(!state.board[r][c+1]||state.board[r][c+1].pw||state.board[r][c+1].obs)continue;
      if(!state.board[r][c+2]||state.board[r][c+2].pw||state.board[r][c+2].obs)continue;
      if(state.board[r][c].t===state.board[r][c+1].t&&state.board[r][c].t===state.board[r][c+2].t){
        let l=3;
        while(c+l<COLS&&state.board[r][c+l]&&!state.board[r][c+l].pw&&!state.board[r][c+l].obs&&state.board[r][c+l].t===state.board[r][c].t)l++;
        for(let i=0;i<l;i++)matched.add(r*100+c+i);
      }
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;r++){
      if(!state.board[r][c]||state.board[r][c].pw||state.board[r][c].obs)continue;
      if(!state.board[r+1]||!state.board[r+1][c]||state.board[r+1][c].pw||state.board[r+1][c].obs)continue;
      if(!state.board[r+2]||!state.board[r+2][c]||state.board[r+2][c].pw||state.board[r+2][c].obs)continue;
      if(state.board[r][c].t===state.board[r+1][c].t&&state.board[r][c].t===state.board[r+2][c].t){
        let l=3;
        while(r+l<ROWS&&state.board[r+l]&&state.board[r+l][c]&&!state.board[r+l][c].pw&&!state.board[r+l][c].obs&&state.board[r+l][c].t===state.board[r][c].t)l++;
        for(let i=0;i<l;i++)matched.add((r+i)*100+c);
      }
    }
  }
  return[...matched].map(k=>({r:Math.floor(k/100),c:k%100}));
}

function analyseMatches(matches){
  const grid=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  matches.forEach(({r,c})=>grid[r][c]=true);

  const visited=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  const groups=[];

  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!grid[r][c]||visited[r][c])continue;
      const cells=[],queue=[{r,c}];
      visited[r][c]=true;
      while(queue.length){
        const {r:cr,c:cc}=queue.shift();
        cells.push({r:cr,c:cc});
        for(const[dr2,dc2]of[[0,1],[0,-1],[1,0],[-1,0]]){
          const nr=cr+dr2,nc=cc+dc2;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&grid[nr][nc]&&!visited[nr][nc]){
            visited[nr][nc]=true;queue.push({r:nr,c:nc});
          }
        }
      }
      groups.push(cells);
    }
  }

  const result={toRemove:new Set(),spawns:[]};
  matches.forEach(({r,c})=>result.toRemove.add(r*100+c));

  groups.forEach(cells=>{
    const n=cells.length;
    const rows=[...new Set(cells.map(c=>c.r))];
    const cols=[...new Set(cells.map(c=>c.c))];
    const pivot=cells[Math.floor(cells.length/2)];

    let spawned=false;
    if(n>=5){
      result.spawns.push({r:pivot.r,c:pivot.c,pw:PW.COLOR,t:state.board[pivot.r][pivot.c].t});
      spawned=true;
    }else if(n===4){
      const isHoriz=rows.length===1;
      result.spawns.push({r:pivot.r,c:pivot.c,pw:isHoriz?PW.ROW:PW.COL,t:state.board[pivot.r][pivot.c].t});
      spawned=true;
    }else if(n>=3&&rows.length>=2&&cols.length>=2){
      result.spawns.push({r:pivot.r,c:pivot.c,pw:PW.BOMB,t:state.board[pivot.r][pivot.c].t});
      spawned=true;
    }
    if(spawned) result.toRemove.delete(pivot.r*100+pivot.c);
  });

  return result;
}

// ── CASCADE (async) ──
async function runCascade(){
  state.comboChain=0;
  while(true){
    const matches=findMatches();
    const pwCells=collectTriggeredPowerups(matches);
    if(matches.length===0&&pwCells.length===0)break;

    state.comboChain++;
    const comboChain=state.comboChain;
    playComboNote(state.comboChain-1);
    vibrate(Math.min(state.comboChain * 6, 40));
    if(state.comboChain>=2 && !IS_MOBILE){
      const bi=document.getElementById('board');
      bi.classList.remove('combo-pulse');
      void bi.offsetWidth;
      bi.classList.add('combo-pulse');
      setTimeout(()=>bi.classList.remove('combo-pulse'),350);
    }

    const analysis=analyseMatches(matches);
    const pts=(analysis.toRemove.size+pwCells.length)*30*(comboChain>1?comboChain:1);
    state.score+=pts;updateStats();
    if(matches.length>=4||comboChain>1)showComboToast(Math.max(matches.length,comboChain*3+1));
    showScorePop(pts,[...matches,...pwCells]);

    const allRemove=new Set(analysis.toRemove);
    for(const {r,c} of pwCells) allRemove.add(r*100+c);

    [...allRemove].forEach(key=>{
      const r=Math.floor(key/100),c=key%100;
      const el=getCell(r,c);
      if(!el)return;
      el.classList.add('popping');
      const rect=el.getBoundingClientRect();
      spawnBurst(rect.left+rect.width/2,rect.top+rect.height/2,BCOLORS[state.board[r][c]?.t??0],
        IS_MOBILE?8:matches.length>=5?30:matches.length>=4?24:18);
    });
    playPopSound();

    await wait(TIMING.POP);

    [...allRemove].forEach(key=>{
      const r=Math.floor(key/100),c=key%100;
      state.board[r][c]=null;
    });
    analysis.spawns.forEach(({r,c,pw,t})=>{
      state.board[r][c]={t,pw};
    });

    damageAdjacentObstacles(allRemove);

    applyGravity();
    await wait(TIMING.DROP);
  }

  state.comboChain=0;state.animating=false;syncState();
  updateGuideBtnGlow();
  resetIdleTimer();
  checkState();
}

function collectTriggeredPowerups(matches){
  const triggered=[];
  const matchSet=new Set(matches.map(({r,c})=>r*100+c));

  matches.forEach(({r,c})=>{
    for(const[dr,dc]of[[0,1],[0,-1],[1,0],[-1,0],[0,0]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const tile=state.board[nr][nc];
      if(!tile||!tile.pw||matchSet.has(nr*100+nc))continue;
      matchSet.add(nr*100+nc);
      const cells=getPowerupCells(nr,nc,tile.pw,tile.t);
      cells.forEach(({r:pr,c:pc})=>{
        if(!matchSet.has(pr*100+pc)){
          matchSet.add(pr*100+pc);
          triggered.push({r:pr,c:pc});
        }
      });
      triggered.push({r:nr,c:nc});
    }
  });
  return triggered;
}

function getPowerupCells(r,c,pw,t){
  const cells=[];
  if(pw===PW.ROW){for(let cc=0;cc<COLS;cc++)cells.push({r,c:cc});}
  else if(pw===PW.COL){for(let rr=0;rr<ROWS;rr++)cells.push({r:rr,c});}
  else if(pw===PW.BOMB){
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)cells.push({r:nr,c:nc});
    }
  }
  return cells;
}

function wait(ms){return new Promise(res=>setTimeout(res,ms));}

// ── OBSTACLE DAMAGE ──
function damageAdjacentObstacles(removedSet){
  const damaged=new Set();
  removedSet.forEach(key=>{
    const r=Math.floor(key/100),c=key%100;
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const tile=state.board[nr][nc];
      if(!tile||!tile.obs)continue;
      const k=nr*100+nc;
      if(damaged.has(k))continue;
      damaged.add(k);

      const el=getCell(nr,nc);
      if(el){
        if(tile.obs==='ice'){
          const sprite=el.querySelector('.obs-sprite');
          if(sprite){
            sprite.classList.remove('ice-2','ice-1','ice-hit');
            void sprite.offsetWidth;
            sprite.classList.add('ice-hit');
            setTimeout(()=>sprite.classList.remove('ice-hit'),420);
          }
        } else {
          el.classList.remove('brick-hit');
          void el.offsetWidth;
          el.classList.add('brick-hit');
          setTimeout(()=>el.classList.remove('brick-hit'),380);
        }
      }

      tile.hp--;
      if(tile.hp<=0){
        if(tile.obs==='brick'){
          spawnObstacleBreakBurst(nr,nc,'brick');
          if(el){
            const rect=el.getBoundingClientRect();
            const stoneSprite=document.createElement('div');
            stoneSprite.style.cssText=`
              position:fixed;
              left:${rect.left-8}px;
              top:${rect.top-8}px;
              width:${rect.width+16}px;
              height:${rect.height+16}px;
              pointer-events:none;
              z-index:600;
              background-repeat:no-repeat;
              background-size:300% 100%;
              background-position:0% 0%;
              animation:stone-break-anim 0.45s steps(1,end) forwards;
              background-image:url(assets/ArtRes/Texture/fx_rock.webp);
            `;
            document.body.appendChild(stoneSprite);
            setTimeout(()=>stoneSprite.remove(),500);
          }
          state.board[nr][nc]=null;
        } else if(tile.obs==='ice'){
          spawnObstacleBreakBurst(nr,nc,'ice');
          tile.obs=null; tile.hp=0;
          if(tile.t<0) tile.t=Math.floor(Math.random()*EMOJIS.length);
        }
      } else {
        updateCell(nr,nc);
      }
    }
  });
  updateLevelLabel();
}

function spawnObstacleBreakBurst(r,c,type){
  const el=getCell(r,c);
  if(!el)return;
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const color=type==='brick'?'#C8820A':'#88CCFF';
  spawnBurst(cx,cy,color,14);
}

// ── GRAVITY ──
function applyGravity(){
  const cellPx=getCellPx();
  for(let c=0;c<COLS;c++){
    const hasBrick=[];
    for(let r=0;r<ROWS;r++) hasBrick[r]=state.board[r][c]?.obs==='brick';

    const survivors=[];
    for(let r=0;r<ROWS;r++){
      if(state.board[r][c]!==null&&!hasBrick[r])
        survivors.push({fromRow:r,tile:state.board[r][c]});
    }

    const brickCount=hasBrick.filter(Boolean).length;
    const totalSlots=ROWS-brickCount;
    const numNew=totalSlots-survivors.length;

    for(let r=0;r<ROWS;r++) if(!hasBrick[r]) state.board[r][c]=null;

    let si=survivors.length-1;
    for(let r=ROWS-1;r>=0&&si>=0;r--){
      if(hasBrick[r])continue;
      state.board[r][c]=survivors[si--].tile;
    }
    let ni=0;
    const newTiles=[];
    for(let r=0;r<ROWS;r++){
      if(hasBrick[r])continue;
      if(!state.board[r][c]){
        const nt={t:Math.floor(Math.random()*EMOJIS.length),pw:null};
        state.board[r][c]=nt;
        newTiles.push({r,tile:nt});
        ni++;
      }
    }

    survivors.forEach((s)=>{
      const fromRow=s.fromRow;
      let toRow=-1;
      for(let r=0;r<ROWS;r++){
        if(state.board[r][c]===s.tile){toRow=r;break;}
      }
      if(toRow<0)return;
      const el=getCell(toRow,c);
      if(!el)return;
      el.style.willChange = 'transform';
      const tile=state.board[toRow][c];
      el.classList.remove('popping','pw-row','pw-col','pw-bomb','pw-color');
      if(tile?.obs==='brick') return;
      applyCellContent(el,tile);
      el.style.opacity='1';
      if(fromRow===toRow){
        el.style.transition='none';el.style.transform='translateY(0)';
      }else{
        const offsetPx=(fromRow-toRow)*cellPx;
        el.style.transition='none';
        el.style.transform=`translateY(${offsetPx}px)`;
        void el.offsetWidth;
        el.style.transition=`transform 0.34s cubic-bezier(.22,1.2,.64,1) ${(toRow-fromRow)*0.018}s`;
        el.style.transform='translateY(0)';
      }
    });

    newTiles.forEach(({r,tile})=>{
      const el=getCell(r,c);
      if(!el)return;
      el.classList.remove('popping','pw-row','pw-col','pw-bomb','pw-color');
      applyCellContent(el,tile);
      const fromAbove=(r+1)*cellPx;
      el.style.transition='none';el.style.opacity='0';
      el.style.transform=`translateY(${-fromAbove}px)`;
      void el.offsetWidth;
      const delay=0.06+r*0.04;
      el.style.transition=`transform 0.38s cubic-bezier(.22,1.3,.64,1) ${delay}s,opacity 0.1s ${delay}s`;
      el.style.opacity='1';el.style.transform='translateY(0)';
    });
  }
  setTimeout(()=>{
    cellEls.flat().forEach(el=>{
      if(!el) return;
      el.style.transition='';
      el.style.transform='';
      el.style.opacity='';
      el.style.willChange='';
      el.classList.remove('popping','dropping');
    });
  },530);
}

// ── VALID MOVE CHECK ──
// FIX: Properly skip ice tiles (treat as immovable like bricks)
function hasValidMoves(){
  const dirs=[[0,1],[1,0]];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    for(let d=0;d<dirs.length;d++){
      const dr=dirs[d][0],dc=dirs[d][1],nr=r+dr,nc=c+dc;
      if(nr>=ROWS||nc>=COLS)continue;
      // FIX: Both bricks AND ice are immovable
      if(state.board[r][c]?.obs||state.board[nr][nc]?.obs)continue;
      const tmp=state.board[r][c];state.board[r][c]=state.board[nr][nc];state.board[nr][nc]=tmp;
      const ok=findMatches().length>0;
      state.board[nr][nc]=state.board[r][c];state.board[r][c]=tmp;
      if(ok)return true;
    }
  }
  // Also valid if any powerup exists
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(state.board[r][c]?.pw)return true;
  return false;
}

// ── HINT ──
function showHint(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(state.board[r][c]?.pw){
      const el=getCell(r,c);
      if(el){el.classList.add('hint');setTimeout(()=>el.classList.remove('hint'),TIMING.HINT);}
      return;
    }
  }
  const dirs=[[0,1],[1,0]];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    for(let d=0;d<dirs.length;d++){
      const dr=dirs[d][0],dc=dirs[d][1],nr=r+dr,nc=c+dc;
      if(nr>=ROWS||nc>=COLS)continue;
      if(state.board[r][c]?.obs||state.board[nr][nc]?.obs)continue;
      const tmp=state.board[r][c];state.board[r][c]=state.board[nr][nc];state.board[nr][nc]=tmp;
      const ok=findMatches().length>0;
      state.board[nr][nc]=state.board[r][c];state.board[r][c]=tmp;
      if(ok){
        [getCell(r,c),getCell(nr,nc)].forEach(el=>{
          if(!el)return;
          el.classList.add('hint');
          setTimeout(()=>el.classList.remove('hint'),TIMING.HINT);
        });
        return;
      }
    }
  }
}

// ── COMBO TOAST ──
function showComboToast(count){
  const msgs={
    4:'四連消！喝口高粱！🍺',
    5:'五連爆！貢糖出現！🎋',
    6:'六連清場！砲彈齊發！💣',
    7:'傳說！金門之魂！⚡',
    99:'全色消除！風獅爺顯靈！🏛️✨'
  };
  const el=document.createElement('div');
  el.className='combo-toast';
  el.textContent=msgs[count]||`${count > 3 ? count+'連消！🔥' : '連鎖消除！🔥'}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1700);
}

function showScorePop(pts,matches){
  if(!matches||matches.length===0)return;
  const avgR=matches.reduce((s,m)=>s+m.r,0)/matches.length;
  const avgC=matches.reduce((s,m)=>s+m.c,0)/matches.length;
  const refEl=getCell(Math.round(avgR),Math.round(avgC));
  const el=document.createElement('div');
  el.className='score-pop';
  el.textContent=`+${pts}`;
  if(refEl){
    const rect=refEl.getBoundingClientRect();
    el.style.left=(rect.left+rect.width/2-20)+'px';
    el.style.top=(rect.top-10)+'px';
  }else{el.style.left='45%';el.style.top='45%';}
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// ── IDLE TIMER ──
let idleTimer=null;
function resetIdleTimer(){
  if(idleTimer)clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>{if(!state.animating)showHint();},TIMING.IDLE);
}

// ── STATS ──
function countObstacles(){
  let bricks=0,ices=0;
  if(!state.board||!state.board.length)return{bricks,ices};
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const t=state.board[r]?.[c];
    if(!t)continue;
    if(t.obs==='brick')bricks++;
    else if(t.obs==='ice')ices++;
  }
  return{bricks,ices};
}

function updateLevelLabel(){
  const name=lv().name;
  const num=['一','二','三','四','五'][state.level]||state.level+1;
  const {bricks,ices}=countObstacles();
  let suffix='';
  if(bricks>0) suffix+=` 🧱×${bricks}`;
  if(ices>0)   suffix+=` ❄️×${ices}`;
  document.getElementById('levelLabel').textContent=`第${num}關 · ${name}${suffix}`;
}

function updateStats(){
  document.getElementById('score').textContent=state.score;
  document.getElementById('target').textContent=lv().target;
  const movesEl=document.getElementById('moves');
  movesEl.textContent=Math.max(0,state.moves);
  if(state.moves<=5&&state.moves>0){movesEl.classList.add('moves-warning');}
  else{movesEl.classList.remove('moves-warning');}
  const pct=Math.min(100,(state.score/lv().target)*100);
  document.getElementById('prog').style.width=pct+'%';
}

function boardHasPowerup(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(state.board[r][c]?.pw)return true;
  return false;
}

function checkState(){
  if(state.score>=lv().target){setTimeout(()=>showModal('win'),300);return;}
  if(state.moves<=0){
    if(boardHasPowerup()){
      showFreeMoveToast('還有道具！免費使用！');
      updateFreeModeStat();
      return;
    }
    setTimeout(()=>showModal('lose'),300);return;
  }
  // FIX: Properly detect deadlock — shuffleBoard if no valid moves found
  if(!hasValidMoves()){
    setTimeout(()=>shuffleBoard(), 200);
  }
}

function shuffleBoard(){
  const cells=cellEls.flat().filter(Boolean);
  cells.forEach(el=>{el.style.transition='opacity 0.25s';el.style.opacity='0';});
  setTimeout(()=>{
    // FIX: Only shuffle non-obstacle tiles
    shuffleNonObstacleData();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)updateCell(r,c);
    const toast=document.createElement('div');
    toast.className='combo-toast';toast.style.fontSize='1.4rem';
    toast.textContent='版面重整中… 🔀';
    document.body.appendChild(toast);setTimeout(()=>toast.remove(),1600);
    cells.forEach(el=>{el.style.opacity='1';});
    setTimeout(()=>{
      cells.forEach(el=>{el.style.transition='';el.style.opacity='';});
      if(findMatches().length>0){
        state.animating=true;
        runCascade();
      } else if(!hasValidMoves()){
        // Still no valid moves after shuffle — try again (up to game engine limits)
        shuffleBoard();
      }
    },350);
  },260);
}

// FIX: New function — only shuffle tiles without obstacles
function shuffleNonObstacleData(){
  const positions=[];
  const tiles=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const tile=state.board[r][c];
    // Only shuffle free tiles (not bricks or ice-frozen)
    if(tile && !tile.obs){
      positions.push({r,c});
      tiles.push(tile);
    }
  }
  // Fisher-Yates shuffle of the free tiles
  for(let i=tiles.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [tiles[i],tiles[j]]=[tiles[j],tiles[i]];
  }
  positions.forEach(({r,c},i)=>{state.board[r][c]=tiles[i];});
}

function showModal(type){
  if(type==='win'){
    document.getElementById('mIcon').textContent='🏛️';
    document.getElementById('mTitle').textContent='風獅爺保佑！';
    document.getElementById('mText').textContent=`得分 ${state.score} 分，完成「${lv().name}」！繼續探索金門吧！`;
    const hasNext=state.level<LEVELS.length-1;
    document.getElementById('mBtn').textContent=hasNext?'下一關 →':'再玩一次';
    document.getElementById('mBtn').onclick=nextLevel;
    setTimeout(launchConfetti,200);
  }else{
    document.getElementById('mIcon').textContent='😔';
    document.getElementById('mTitle').textContent='再接再厲！';
    document.getElementById('mText').textContent=`差 ${lv().target-state.score} 分！高粱酒等著你，再試一次！`;
    document.getElementById('mBtn').textContent='重新挑戰';
    document.getElementById('mBtn').onclick=()=>{hideModal();init();};
  }
  document.getElementById('overlay').classList.add('show');
}
function hideModal(){document.getElementById('overlay').classList.remove('show');}
function nextLevel(){hideModal();confActive=false;confetti=[];confCtx.clearRect(0,0,confCvs.width,confCvs.height);state.level=state.level<LEVELS.length-1?state.level+1:0;init();}

// ── CONFETTI / FIREWORK ENGINE ──
const confCvs=document.getElementById('confetti-canvas');
const confCtx=confCvs.getContext('2d');
let confetti=[],confRaf=null,confActive=false;

function resizeConf(){confCvs.width=window.innerWidth;confCvs.height=window.innerHeight;}
resizeConf();
window.addEventListener('resize',resizeConf);

const CONF_COLORS=['#FFD700','#FF6B35','#FF3B8B','#44AAFF','#44FF88','#CC44FF','#FFE566','#FF4444','#FFFFFF','#FF9900'];
const RIBBON_COLORS=['#FFD700','#FF6B35','#44AAFF','#FF3B8B','#44FF88','#CC44FF','#FFE566'];

function playCelebrationSound(){
  try{
    const ac=getAudioCtx();
    const now=ac.currentTime;
    function makeCheer(t,dur,freq,gain){
      const len=Math.ceil(ac.sampleRate*dur);
      const buf=ac.createBuffer(2,len,ac.sampleRate);
      for(let ch=0;ch<2;ch++){
        const d=buf.getChannelData(ch);
        for(let i=0;i<len;i++) d[i]=(Math.random()*2-1);
      }
      const src=ac.createBufferSource(); src.buffer=buf;
      const filt=ac.createBiquadFilter(); filt.type='bandpass';
      filt.frequency.setValueAtTime(freq*0.7,t);
      filt.frequency.linearRampToValueAtTime(freq*1.4,t+dur*0.4);
      filt.frequency.linearRampToValueAtTime(freq*0.9,t+dur);
      filt.Q.value=0.6;
      const g=ac.createGain();
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(gain,t+dur*0.15);
      g.gain.linearRampToValueAtTime(gain*0.7,t+dur*0.7);
      g.gain.linearRampToValueAtTime(0,t+dur);
      src.connect(filt); filt.connect(g); g.connect(ac.destination);
      src.start(t); src.stop(t+dur+0.05);
    }
    makeCheer(now,   2.2, 350, 0.18);
    makeCheer(now+0.05, 2.0, 700, 0.12);
    makeCheer(now+0.1,  1.8, 1400, 0.07);
    makeCheer(now+0.5,  1.6, 550, 0.10);
    const hornNotes=[523.3,659.3,784,1046.5];
    hornNotes.forEach((freq,i)=>{
      const ht=now+0.05+i*0.11;
      const osc=ac.createOscillator(); osc.type='sawtooth';
      osc.frequency.setValueAtTime(freq,ht);
      const hf=ac.createBiquadFilter(); hf.type='lowpass'; hf.frequency.value=2200;
      const hg=ac.createGain();
      hg.gain.setValueAtTime(0,ht);
      hg.gain.linearRampToValueAtTime(0.14,ht+0.04);
      hg.gain.exponentialRampToValueAtTime(0.001,ht+0.35);
      osc.connect(hf); hf.connect(hg); hg.connect(ac.destination);
      osc.start(ht); osc.stop(ht+0.38);
    });
    function fireworkBoom(t,freq,gain){
      const osc=ac.createOscillator(); osc.type='sine';
      osc.frequency.setValueAtTime(freq,t);
      osc.frequency.exponentialRampToValueAtTime(freq*0.25,t+0.35);
      const g=ac.createGain();
      g.gain.setValueAtTime(gain,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.38);
      osc.connect(g); g.connect(ac.destination);
      osc.start(t); osc.stop(t+0.4);
      const cl=Math.ceil(ac.sampleRate*0.055);
      const cb=ac.createBuffer(1,cl,ac.sampleRate);
      const cd=cb.getChannelData(0);
      for(let i=0;i<cl;i++) cd[i]=(Math.random()*2-1)*(1-i/cl)**2.5;
      const cs=ac.createBufferSource(); cs.buffer=cb;
      const cg=ac.createGain(); cg.gain.setValueAtTime(gain*0.8,t);
      cs.connect(cg); cg.connect(ac.destination); cs.start(t); cs.stop(t+0.06);
    }
    fireworkBoom(now+0.42, 90, 0.65);
    fireworkBoom(now+1.05, 70, 0.45);
    fireworkBoom(now+1.65, 80, 0.35);
    for(let i=0;i<14;i++){
      const t=now+0.48+i*0.13+Math.random()*0.07;
      const sl=Math.ceil(ac.sampleRate*0.04);
      const sb=ac.createBuffer(1,sl,ac.sampleRate);
      const sd=sb.getChannelData(0);
      for(let j=0;j<sl;j++) sd[j]=(Math.random()*2-1)*(1-j/sl)**3;
      const ss=ac.createBufferSource(); ss.buffer=sb;
      const sf=ac.createBiquadFilter(); sf.type='highpass'; sf.frequency.value=2500+Math.random()*3500;
      const sg=ac.createGain(); sg.gain.setValueAtTime(0.15+Math.random()*0.1,t);
      ss.connect(sf); sf.connect(sg); sg.connect(ac.destination);
      ss.start(t); ss.stop(t+0.045);
    }
    const shimOsc=ac.createOscillator(); shimOsc.type='triangle';
    shimOsc.frequency.setValueAtTime(300,now); shimOsc.frequency.linearRampToValueAtTime(1200,now+0.4);
    const shimG=ac.createGain(); shimG.gain.setValueAtTime(0.06,now); shimG.gain.linearRampToValueAtTime(0,now+0.42);
    shimOsc.connect(shimG); shimG.connect(ac.destination);
    shimOsc.start(now); shimOsc.stop(now+0.44);
  }catch(e){console.warn('Audio error',e);}
}

function spawnFireworkBurst(cx,cy,color,count,speedScale){
  for(let i=0;i<count;i++){
    const a=Math.PI*2*i/count+(Math.random()-0.5)*0.5;
    const spd=(2.5+Math.random()*8)*speedScale;
    confetti.push({
      x:cx,y:cy,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      rot:0,rotV:0,
      w:2+Math.random()*3.5, h:2+Math.random()*3.5,
      color,isRibbon:false,
      alpha:1, decay:0.011+Math.random()*0.009,
      wobble:0, wobbleV:0, gravity:0.12,
      isSpark:true, trail:[],
    });
  }
  for(let ri=0;ri<3;ri++){
    confetti.push({
      x:cx,y:cy,isConfRing:true,
      ringR:ri*6, ringSpeed:8-ri*1.5,
      color, alpha:0.8-ri*0.15, decay:0.022,
    });
  }
}

function spawnRibbonBurst(cx,cy,count=60){
  for(let i=0;i<count;i++){
    const a=Math.PI*2*i/count+(Math.random()-0.5)*0.6;
    const spd=3.5+Math.random()*9;
    const color=RIBBON_COLORS[Math.floor(Math.random()*RIBBON_COLORS.length)];
    confetti.push({
      x:cx, y:cy,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      rot:a, rotV:(Math.random()-0.5)*0.22,
      w:3+Math.random()*2, h:14+Math.random()*24,
      color, isRibbon:true,
      alpha:1, decay:0,
      wobble:Math.random()*Math.PI*2, wobbleV:0.09+Math.random()*0.08,
      gravity:0.09,
    });
  }
}

function launchConfetti(){
  if(IS_MOBILE){
    playCelebrationSound();
    showComboToast(99);
    return;
  }
  confActive=true;
  confetti=[];
  const W=confCvs.width, H=confCvs.height;
  const CX=W/2, CY=H/2;
  playCelebrationSound();
  spawnFireworkBurst(CX, CY, '#FFE566', 50, 1.0);
  spawnRibbonBurst(CX, CY, 55);
  setTimeout(()=>{
    if(!confActive)return;
    const c=CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)];
    spawnFireworkBurst(CX, CY, c, 65, 1.25);
    spawnRibbonBurst(CX, CY, 40);
  }, 320);
  const offsets=[
    {dx:-W*0.12,dy:-H*0.10},
    {dx: W*0.12,dy:-H*0.10},
    {dx:-W*0.08,dy: H*0.12},
    {dx: W*0.08,dy: H*0.12},
  ];
  offsets.forEach((off,i)=>{
    setTimeout(()=>{
      if(!confActive)return;
      const c=CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)];
      spawnFireworkBurst(CX+off.dx, CY+off.dy, c, 38, 1.0);
    }, 650+i*160);
  });
  setTimeout(()=>{
    if(!confActive)return;
    for(let i=0;i<120;i++){
      const color=CONF_COLORS[Math.floor(Math.random()*CONF_COLORS.length)];
      const isRibbon=Math.random()<0.42;
      const a=(Math.random()-0.5)*Math.PI*2;
      const spd=2+Math.random()*7;
      confetti.push({
        x:CX+(Math.random()-0.5)*W*0.08,
        y:CY+(Math.random()-0.5)*H*0.08,
        vx:Math.cos(a)*spd,
        vy:Math.sin(a)*spd,
        rot:Math.random()*Math.PI*2,
        rotV:(Math.random()-0.5)*0.2,
        w:isRibbon?3+Math.random()*3:5+Math.random()*7,
        h:isRibbon?14+Math.random()*22:5+Math.random()*7,
        color, isRibbon,
        alpha:1, decay:0,
        wobble:Math.random()*Math.PI*2, wobbleV:0.07+Math.random()*0.07,
        gravity:0.08+Math.random()*0.07,
      });
    }
  }, 1300);
  setTimeout(()=>{
    if(!confActive)return;
    spawnFireworkBurst(CX, CY, '#FFD700', 90, 1.5);
    spawnRibbonBurst(CX, CY, 70);
  }, 2000);
  setTimeout(()=>{
    confetti.forEach(p=>{if(!p.decay)p.decay=0.007+Math.random()*0.005;});
  }, 3800);
  setTimeout(()=>{
    confActive=false; confetti=[];
    confCtx.clearRect(0,0,confCvs.width,confCvs.height);
    confRaf=null;
  }, 5800);
  if(!confRaf) tickConfetti();
}

function tickConfetti(){
  if(!confActive&&confetti.length===0){confRaf=null;return;}
  confCtx.clearRect(0,0,confCvs.width,confCvs.height);
  confetti=confetti.filter(p=>p.alpha>0.02);
  for(const p of confetti){
    confCtx.save();
    confCtx.globalAlpha=Math.max(0,p.alpha);
    if(p.isConfRing){
      p.ringR+=p.ringSpeed; p.ringSpeed*=0.88;
      confCtx.strokeStyle=p.color;
      confCtx.lineWidth=3*p.alpha;
      confCtx.beginPath(); confCtx.arc(p.x,p.y,p.ringR,0,Math.PI*2); confCtx.stroke();
    } else if(p.isSpark){
      p.trail=p.trail||[];
      p.trail.push({x:p.x,y:p.y});
      if(p.trail.length>6) p.trail.shift();
      for(let ti=0;ti<p.trail.length-1;ti++){
        confCtx.globalAlpha=p.alpha*(ti/p.trail.length)*0.35;
        confCtx.strokeStyle=p.color; confCtx.lineWidth=2;
        confCtx.beginPath();
        confCtx.moveTo(p.trail[ti].x,p.trail[ti].y);
        confCtx.lineTo(p.trail[ti+1].x,p.trail[ti+1].y);
        confCtx.stroke();
      }
      confCtx.globalAlpha=p.alpha;
      confCtx.fillStyle=p.color;
      confCtx.beginPath(); confCtx.arc(p.x,p.y,p.w/2,0,Math.PI*2); confCtx.fill();
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.97;
    } else {
      p.wobble+=p.wobbleV;
      p.x+=p.vx+Math.sin(p.wobble)*0.9;
      p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.985;
      p.rot+=p.rotV;
      confCtx.translate(p.x,p.y); confCtx.rotate(p.rot);
      if(p.isRibbon){
        const wave=Math.sin(p.wobble)*3;
        confCtx.fillStyle=p.color;
        confCtx.beginPath();
        confCtx.moveTo(-p.w/2,0);
        confCtx.quadraticCurveTo(wave,p.h/2,p.w/2,p.h);
        confCtx.lineTo(p.w/2,p.h);
        confCtx.quadraticCurveTo(-wave,p.h/2,-p.w/2,0);
        confCtx.closePath(); confCtx.fill();
      } else {
        const sx=Math.abs(Math.cos(p.wobble*1.3));
        confCtx.scale(sx,1);
        confCtx.fillStyle=p.color;
        confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      }
    }
    if(p.decay) p.alpha-=p.decay;
    confCtx.restore();
  }
  confRaf=requestAnimationFrame(tickConfetti);
}
